spring.application.name=backend
server.port=8080

# AWS Configuration (loaded from environment variables)
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}
spring.cloud.aws.region.static=${AWS_REGION:ap-south-1}

# Amazon Cognito - JWT Validation
# Spring Security will use this URL to fetch the public keys and validate JWTs automatically
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI:https://cognito-idp.${AWS_REGION:ap-south-1}.amazonaws.com/${COGNITO_USER_POOL_ID:}}

# App Config
app.cognito.user-pool-id=${COGNITO_USER_POOL_ID:}
app.cognito.client-id=${COGNITO_CLIENT_ID:}
app.cognito.region=${AWS_REGION:ap-south-1}
app.s3.bucket-name=${S3_BUCKET_NAME:}

# SQS Config
app.sqs.event-queue-name=${SQS_EVENT_QUEUE_NAME:}

# Database Configuration (defaults to H2 for local safety)
spring.datasource.url=${DB_URL:jdbc:h2:mem:docuguard_db}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
